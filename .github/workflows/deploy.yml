name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stamp cache-busting version into asset URLs
        # Replace the __CACHE_BUST__ placeholder in index.html with this commit's
        # short SHA, so browsers always fetch fresh CSS/JS after a deploy.
        run: sed -i "s/__CACHE_BUST__/${GITHUB_SHA::8}/g" index.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically so no manual repo setting is needed.
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo root (it's a static site).
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
